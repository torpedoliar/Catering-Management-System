server {
    listen 3011;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Kernel-level file serving optimization
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # File descriptor cache — reduces open() syscalls for static assets
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Gzip compression — improved for API responses
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/xml
        application/x-javascript
        image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Cache Control for static assets (js, css, images)
    # Vite outputs hashed filenames, so 1y + immutable is safe
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Don't cache HTML to ensure cache-busting index.html is always fresh
    location ~* \.(?:manifest|appcache|html?|xml|json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
