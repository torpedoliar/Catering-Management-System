# ============================================
# Nginx Proxy Manager Configuration
# Custom Nginx Config untuk Catering Management System
# ============================================
#
# Salin konfigurasi ini ke NPM > Proxy Host > Advanced Tab
#

# R-004: Security headers (applied globally)
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'" always;

# R-006: Hide upstream technology headers
proxy_hide_header X-Powered-By;
proxy_hide_header Server;

# SSE Support - WAJIB untuk realtime (R-002: now requires ticket-based auth)
location /api/sse {
    proxy_pass http://catering-backend:3012;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400;
    proxy_set_header Connection '';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    chunked_transfer_encoding off;

    # R-006: Suppress technology disclosure
    proxy_hide_header X-Powered-By;
}

# API dengan upload support
location /api/ {
    proxy_pass http://catering-backend:3012;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 50M;
    proxy_read_timeout 300;

    # R-006: Suppress technology disclosure
    proxy_hide_header X-Powered-By;
}

# Static uploads dengan caching
location /uploads/ {
    proxy_pass http://catering-backend:3012/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Cache static files
    proxy_cache_valid 200 1d;
    expires 1d;
    add_header Cache-Control "public, immutable";
}

# Health check
location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}
