# ============================================
# Nginx Proxy Manager — Advanced Configuration
# Catering Management System (HalloFood)
# ============================================
#
# Paste this into: NPM > Proxy Host > Advanced Tab
#
# DESIGN: Security headers are ONLY injected here (NPM/openresty layer).
# Express backend does NOT set security headers — avoids duplication.
# This ensures SPA root HTML (/, /login, /dashboard) receives identical
# security headers as API and static responses.
#

# ─── Technology Disclosure Suppression (R-005/F-005) ───
proxy_hide_header X-Powered-By;
proxy_hide_header Server;
proxy_hide_header X-Served-By;
more_clear_headers 'Server';
more_clear_headers 'X-Served-By';

# ─── Server-level Security Headers (R-001/F-001) ───
# These apply to the default SPA root (/) served by NPM's proxy target.
# Per Nginx semantics, server-level add_header is inherited by locations
# that do NOT define their own add_header. Locations below define their own
# copies because they need add_header (which clears server-level inheritance).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

# ─── SSE Endpoint (R-002: ticket-based auth) ───
location /api/sse {
    proxy_pass http://catering-backend:3012;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400;
    proxy_set_header Connection '';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    chunked_transfer_encoding off;

    # Must re-declare headers here (Nginx clears server-level on location add_header)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    proxy_hide_header X-Powered-By;
    proxy_hide_header X-Served-By;
}

# ─── API Routes ───
location /api/ {
    proxy_pass http://catering-backend:3012;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 50M;
    proxy_read_timeout 300;

    # Must re-declare headers here (Nginx clears server-level on location add_header)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    proxy_hide_header X-Powered-By;
    proxy_hide_header X-Served-By;
}

# ─── Static Uploads ───
location /uploads/ {
    proxy_pass http://catering-backend:3012/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_cache_valid 200 1d;
    expires 1d;
    add_header Cache-Control "public, immutable";

    # Re-declare security headers for static assets
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    proxy_hide_header X-Powered-By;
    proxy_hide_header X-Served-By;
}
